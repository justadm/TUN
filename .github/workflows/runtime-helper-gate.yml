name: runtime-helper-gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    paths:
      - "cmd/runtime-helper/**"
      - "cmd/runtime-helperctl/**"
      - "internal/runtime/**"
      - "internal/tun/**"
      - "scripts/runtime_helper_smoke.sh"
      - "scripts/runtime_helper_bridge_autopilot_smoke.sh"
      - "scripts/runtime_helper_bridge_autopilot_canary.sh"
      - "scripts/runtime_helper_contract_check_matrix.sh"
      - "scripts/bootstrap_runtime_helper_gate_bundle.sh"
      - "scripts/release_gate_runtime_helper.sh"
      - "Makefile"
      - "justfile"
      - ".docs/tun-rnd-productization/rnd-to-prod/runtime-helper-release-gate-runbook.md"
      - ".github/workflows/runtime-helper-gate.yml"
  workflow_dispatch: {}

jobs:
  contract-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: contract matrix preflight
        run: make gate-contract-matrix

  ci-fast:
    runs-on: ubuntu-latest
    needs: contract-matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: prepare artifacts dir
        run: mkdir -p artifacts/runtime-helper-gate
      - name: runtime-helper gate (ci-fast)
        run: ./scripts/release_gate_runtime_helper.sh --profile ci-fast --report-file artifacts/runtime-helper-gate/ci-fast-report.json
      - name: upload ci-fast artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-helper-gate-ci-fast
          path: artifacts/runtime-helper-gate/**
          if-no-files-found: ignore

  ci-full:
    runs-on: ubuntu-latest
    needs: contract-matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: prepare artifacts dir
        run: mkdir -p artifacts/runtime-helper-gate
      - name: runtime-helper gate bundle (ci-full)
        env:
          HELPER_SMOKE_TRANSPORT: unix
        run: ./scripts/bootstrap_runtime_helper_gate_bundle.sh --profile ci-full --out-dir artifacts/runtime-helper-gate
      - name: upload ci-full artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-helper-gate-ci-full
          path: artifacts/runtime-helper-gate/**
          if-no-files-found: ignore
